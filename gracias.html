<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Gracias | Inference Lab</title>
<style>
  :root{
    --bg:#070707;
    --panel:#111111;
    --text:#f4f1eb;
    --muted:#9a938a;
    --accent:#ff7a18;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:
      radial-gradient(circle at top, rgba(255,122,24,.12), transparent 32%),
      linear-gradient(180deg, #0b0b0b, #050505 70%);
    color:var(--text);
    display:grid;
    place-items:center;
    padding:24px;
  }
  .card{
    width:min(720px,100%);
    background:rgba(17,17,17,.92);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:42px;
    box-shadow:0 24px 90px rgba(0,0,0,.45);
  }
  .eyebrow{
    color:var(--accent);
    text-transform:uppercase;
    letter-spacing:.22em;
    font-size:.72rem;
    margin:0 0 14px;
  }
  h1{
    margin:0 0 14px;
    font-family:"Space Grotesk",Inter,system-ui,sans-serif;
    font-size:clamp(2rem,5vw,3.4rem);
    line-height:1.02;
  }
  p{margin:0 0 18px;color:var(--muted);font-size:1rem;line-height:1.7;max-width:58ch}
  a{
    display:inline-block;
    text-decoration:none;
    color:#111;
    background:var(--accent);
    padding:12px 18px;
    border-radius:999px;
    font-weight:700;
  }
</style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Mensaje enviado</div>
    <h1>Gracias por escribirnos.</h1>
    <p>Recibimos tu mensaje y te responderemos lo antes posible. Mientras tanto, puedes volver a la página principal o seguir revisando tu proyecto.</p>
    <a href="/">Volver al inicio</a>
  </main>
</body>
</html>
